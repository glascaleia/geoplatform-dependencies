plugins {
    id 'io.spring.dependency-management'
}

ext {
    hibernateValidatorVersion = "9.1.1.Final";
    jakartaValidationApiVersion = "3.1.1";
}

dependencyManagement {
    dependencies {
        dependency 'org.hibernate.validator:hibernate-validator:' + hibernateValidatorVersion
        dependency 'jakarta.validation:jakarta.validation-api:' + jakartaValidationApiVersion
        dependency 'org.glassfish:jakarta.el:4.0.2'
    }
}